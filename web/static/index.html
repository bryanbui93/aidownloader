<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Video Downloader</title>
  <meta name="description" content="Download TikTok, Facebook Reels, YouTube Shorts & Douyin videos in bulk." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c0e;
      --surface:   #141416;
      --surface2:  #1c1c20;
      --border:    #28282e;
      --border2:   #38383f;
      --text:      #ececf0;
      --muted:     #6b6b78;
      --accent:    #f59e0b;
      --accent-h:  #fbbf24;
      --success:   #10b981;
      --error:     #f43f5e;
      --tiktok:    #ff2d55;
      --facebook:  #1877f2;
      --youtube:   #ff0000;
      --douyin:    #fe2c55;
      --unknown:   #6b6b78;
      --radius:    12px;
      --radius-sm: 8px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }
    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .brand { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .brand span { color: var(--accent); }
    .tagline { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .platform-badges { margin-left: auto; display: flex; gap: 6px; }
    .badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
      padding: 3px 8px; border-radius: 4px;
      text-transform: uppercase;
    }
    .badge-tiktok  { background: #ff2d5520; color: var(--tiktok); }
    .badge-fb      { background: #1877f220; color: var(--facebook); }
    .badge-yt      { background: #ff000020; color: var(--youtube); }
    .badge-dy      { background: #fe2c5520; color: var(--douyin); }

    /* ── Main layout ────────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 0;
      height: calc(100vh - 77px);
    }

    /* ── Left panel ─────────────────────────────── */
    .left-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none; border: none; cursor: pointer;
      padding: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: var(--surface2);
    }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .tab-content { display: none; padding: 24px; }
    .tab-content.active { display: block; }

    /* Input form */
    .form-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--muted); margin-bottom: 8px;
      display: block;
    }
    .input-group { margin-bottom: 20px; }

    textarea, input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      padding: 12px 14px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea { height: 100px; }
    textarea:focus, input[type="text"]:focus { border-color: var(--accent); }
    textarea::placeholder, input::placeholder { color: var(--muted); }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border2);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: #f59e0b08;
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .drop-icon { font-size: 32px; margin-bottom: 12px; }
    .drop-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .drop-sub { font-size: 12px; color: var(--muted); }

    .file-info {
      margin-top: 14px; display: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      display: none; align-items: center; gap: 10px;
    }
    .file-info.visible { display: flex; }
    .file-info-icon { font-size: 20px; }
    .file-info-name { font-size: 13px; font-weight: 500; flex: 1; }
    .file-info-count { font-size: 12px; color: var(--accent); font-weight: 600; }

    /* Cookies option */
    .cookies-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
    }
    .cookies-row label { font-size: 12px; color: var(--muted); }
    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 14px;
      border: none; border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary {
      background: var(--accent);
      color: #0c0c0e;
    }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Right panel ─────────────────────────────── */
    .right-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .right-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .right-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .clear-btn {
      background: none; border: none; cursor: pointer;
      font-size: 12px; color: var(--muted);
      font-family: 'Inter', sans-serif;
      padding: 4px 8px; border-radius: 4px;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--error); }

    .queue-container {
      flex: 1; overflow-y: auto; padding: 16px 24px;
    }

    /* ── Empty state ─────────────────────────────── */
    .empty-state {
      height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); text-align: center;
      gap: 12px;
    }
    .empty-state .icon { font-size: 48px; opacity: 0.5; }
    .empty-state p { font-size: 14px; }

    /* ── Summary bar ─────────────────────────────── */
    .summary-bar {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      display: flex; gap: 24px; align-items: center;
      background: var(--surface);
      display: none;
    }
    .summary-bar.visible { display: flex; }
    .stat { font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .stat-label { color: var(--muted); }
    .stat-val { font-weight: 600; }
    .stat-success { color: var(--success); }
    .stat-error   { color: var(--error); }
    .output-path {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
      background: var(--surface2);
      padding: 4px 10px; border-radius: 4px;
      border: 1px solid var(--border);
      max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Download item ───────────────────────────── */
    .dl-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex; align-items: flex-start; gap: 12px;
      animation: slideIn 0.25s ease-out;
      transition: border-color 0.3s;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .dl-item.success { border-color: #10b98130; }
    .dl-item.failed  { border-color: #f43f5e30; }

    .platform-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0; margin-top: 6px;
    }
    .dot-tiktok  { background: var(--tiktok); box-shadow: 0 0 6px var(--tiktok); }
    .dot-douyin  { background: var(--douyin); box-shadow: 0 0 6px var(--douyin); }
    .dot-facebook{ background: var(--facebook); box-shadow: 0 0 6px var(--facebook); }
    .dot-youtube { background: var(--youtube); box-shadow: 0 0 6px var(--youtube); }
    .dot-unknown { background: var(--unknown); }

    .dl-info { flex: 1; min-width: 0; }
    .dl-platform {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 4px;
    }
    .dl-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      margin-bottom: 6px;
    }
    .dl-filename {
      font-size: 12px; font-weight: 500; color: var(--success);
      margin-top: 4px;
    }
    .dl-error {
      font-size: 11px; color: var(--error);
      margin-top: 4px; line-height: 1.4;
    }

    .dl-status {
      flex-shrink: 0;
      font-size: 18px;
      display: flex; align-items: center;
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* Attempt badge */
    .attempt-badge {
      font-size: 10px; color: var(--accent);
      background: #f59e0b15;
      padding: 2px 6px; border-radius: 4px;
      font-weight: 600;
    }

    /* ── Overall progress ───────────────────────── */
    .overall-progress {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      display: none;
    }
    .overall-progress.visible { display: block; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--muted); margin-bottom: 8px;
    }
    .progress-bar-track {
      height: 4px; background: var(--surface2);
      border-radius: 2px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; }
      .left-panel { border-right: none; border-bottom: 1px solid var(--border); }
      .platform-badges { display: none; }
      main { height: auto; min-height: calc(100vh - 77px); }
    }

    /* ── Scrollbar ──────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🎬</div>
  <div>
    <div class="brand">AI<span>Downloader</span></div>
    <div class="tagline">Batch video downloader</div>
  </div>
  <div class="platform-badges">
    <span class="badge badge-tiktok">TikTok</span>
    <span class="badge badge-dy">Douyin</span>
    <span class="badge badge-fb">Facebook</span>
    <span class="badge badge-yt">YouTube</span>
  </div>
</header>

<main>
  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="tabs">
      <button class="tab-btn active" id="tab-url" onclick="switchTab('url')">🔗 Single URL</button>
      <button class="tab-btn" id="tab-excel" onclick="switchTab('excel')">📊 Excel Batch</button>
    </div>

    <!-- URL MODE -->
    <div class="tab-content active" id="content-url">
      <div class="input-group">
        <label class="form-label">Video URL</label>
        <textarea id="url-input" placeholder="https://www.tiktok.com/@user/video/...&#10;https://www.facebook.com/reel/...&#10;https://www.youtube.com/shorts/..."></textarea>
        <div id="url-platform-hint" style="font-size:11px;color:var(--muted);margin-top:6px;min-height:16px;"></div>
      </div>

      <div class="cookies-row">
        <label>🍪 Cookies from browser</label>
        <select id="url-cookies">
          <option value="">None (default)</option>
          <option value="chrome">Chrome</option>
          <option value="firefox">Firefox</option>
          <option value="edge">Edge</option>
        </select>
      </div>

      <button class="btn btn-primary" id="url-download-btn" onclick="startUrlDownload()" disabled>
        ⬇ Download Video
      </button>
    </div>

    <!-- EXCEL MODE -->
    <div class="tab-content" id="content-excel">
      <div class="input-group">
        <label class="form-label">Excel File (.xlsx)</label>
        <div class="drop-zone" id="drop-zone">
          <input type="file" id="excel-file" accept=".xlsx,.xls" onchange="onFileChange(event)" />
          <div class="drop-icon">📂</div>
          <div class="drop-title">Drop your Excel file here</div>
          <div class="drop-sub">or click to browse — URL column is auto-detected</div>
        </div>
        <div class="file-info" id="file-info">
          <span class="file-info-icon">📊</span>
          <span class="file-info-name" id="file-name">—</span>
          <span class="file-info-count" id="file-count"></span>
        </div>
      </div>

      <div class="cookies-row">
        <label>🍪 Cookies from browser</label>
        <select id="excel-cookies">
          <option value="">None (default)</option>
          <option value="chrome">Chrome</option>
          <option value="firefox">Firefox</option>
          <option value="edge">Edge</option>
        </select>
      </div>

      <button class="btn btn-primary" id="excel-download-btn" onclick="startExcelDownload()" disabled>
        ⬇ Start Batch Download
      </button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="right-header">
      <span class="right-title">Downloads</span>
      <button class="clear-btn" onclick="clearQueue()">Clear all</button>
    </div>

    <div class="queue-container" id="queue-container">
      <div class="empty-state" id="empty-state">
        <div class="icon">📭</div>
        <p>No downloads yet.<br />Paste a link or upload an Excel file to get started.</p>
      </div>
    </div>

    <div class="overall-progress" id="overall-progress">
      <div class="progress-label">
        <span id="progress-text">Preparing...</span>
        <span id="progress-count">0 / 0</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="summary-bar" id="summary-bar">
      <div class="stat">
        <span class="stat-label">Total</span>
        <span class="stat-val" id="stat-total">0</span>
      </div>
      <div class="stat">
        <span class="stat-val stat-success" id="stat-success">0</span>
        <span class="stat-label">succeeded</span>
      </div>
      <div class="stat">
        <span class="stat-val stat-error" id="stat-failed">0</span>
        <span class="stat-label">failed</span>
      </div>
      <div class="output-path" id="stat-path" title=""></div>
    </div>
  </div>
</main>

<script>
  // ── Tab switching ───────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('content-' + tab).classList.add('active');
  }

  // ── URL detection hint ──────────────────────────────────────────────────────
  const PLATFORM_PATTERNS = [
    { re: /tiktok\.com/i,          label: '🎵 TikTok', color: '#ff2d55' },
    { re: /douyin\.com/i,          label: '🎵 Douyin', color: '#fe2c55' },
    { re: /facebook\.com|fb\.watch/i, label: '📘 Facebook Reel', color: '#1877f2' },
    { re: /youtube\.com\/shorts|youtu\.be/i, label: '▶ YouTube Shorts', color: '#ff0000' },
  ];

  const urlInput = document.getElementById('url-input');
  const urlBtn   = document.getElementById('url-download-btn');
  const hint     = document.getElementById('url-platform-hint');

  urlInput.addEventListener('input', () => {
    const val = urlInput.value.trim();
    if (!val) { hint.textContent = ''; urlBtn.disabled = true; return; }
    const match = PLATFORM_PATTERNS.find(p => p.re.test(val));
    if (match) {
      hint.innerHTML = `<span style="color:${match.color};font-weight:600">${match.label} detected</span>`;
      urlBtn.disabled = false;
    } else {
      hint.innerHTML = `<span style="color:var(--muted)">Unsupported URL</span>`;
      urlBtn.disabled = true;
    }
  });

  // ── Drag & drop ─────────────────────────────────────────────────────────────
  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  let selectedFile = null;

  function onFileChange(e) { if (e.target.files[0]) handleFile(e.target.files[0]); }

  function handleFile(file) {
    selectedFile = file;
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('file-info').classList.add('visible');
    document.getElementById('file-count').textContent = 'Queued';
    document.getElementById('excel-download-btn').disabled = false;
  }

  // ── Queue state ─────────────────────────────────────────────────────────────
  let dlItems = {}; // index -> element
  let total = 0, completed = 0;

  function clearQueue() {
    dlItems = {}; total = 0; completed = 0;
    const container = document.getElementById('queue-container');
    container.innerHTML = '<div class="empty-state" id="empty-state"><div class="icon">📭</div><p>No downloads yet.<br />Paste a link or upload an Excel file to get started.</p></div>';
    document.getElementById('summary-bar').classList.remove('visible');
    document.getElementById('overall-progress').classList.remove('visible');
  }

  function platformClass(platform) {
    return platform.toLowerCase();
  }

  function createItem(index, url, platform) {
    const item = document.createElement('div');
    item.className = 'dl-item';
    item.id = `dl-${index}`;
    item.innerHTML = `
      <div class="platform-dot dot-${platformClass(platform)}"></div>
      <div class="dl-info">
        <div class="dl-platform" style="color:var(--${platformClass(platform) === 'youtube' ? 'youtube' : platformClass(platform)})">${platform}</div>
        <div class="dl-url">${url}</div>
        <div class="dl-extra"></div>
      </div>
      <div class="dl-status"><div class="spinner"></div></div>
    `;
    return item;
  }

  function updateItem(index, status, data) {
    const item = document.getElementById(`dl-${index}`);
    if (!item) return;
    const statusEl = item.querySelector('.dl-status');
    const extraEl  = item.querySelector('.dl-extra');

    if (status === 'downloading') {
      statusEl.innerHTML = `<div class="spinner"></div>`;
      if (data.attempt > 1) {
        extraEl.innerHTML = `<span class="attempt-badge">Retry ${data.attempt}</span>`;
      }
    } else if (status === 'success') {
      item.classList.add('success');
      statusEl.innerHTML = `<span style="color:var(--success);font-size:20px">✅</span>`;
      extraEl.innerHTML = `<div class="dl-filename">📄 ${data.filename}</div>`;
    } else if (status === 'failed') {
      item.classList.add('failed');
      statusEl.innerHTML = `<span style="color:var(--error);font-size:20px">❌</span>`;
      const shortErr = (data.error || 'Unknown error').substring(0, 120);
      extraEl.innerHTML = `<div class="dl-error">${shortErr}</div>`;
    }
  }

  function removeEmptyState() {
    const es = document.getElementById('empty-state');
    if (es) es.remove();
  }

  function setProgress(done, tot, label) {
    const pct = tot > 0 ? Math.round((done / tot) * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-count').textContent = `${done} / ${tot}`;
    document.getElementById('progress-text').textContent = label;
    document.getElementById('overall-progress').classList.add('visible');
  }

  function setDisabled(disabled) {
    document.getElementById('url-download-btn').disabled = disabled || !urlInput.value.trim();
    document.getElementById('excel-download-btn').disabled = disabled || !selectedFile;
  }

  // ── SSE listener ─────────────────────────────────────────────────────────
  function listenSession(sessionId) {
    const es = new EventSource(`/api/stream/${sessionId}`);

    es.addEventListener('start', e => {
      const d = JSON.parse(e.data);
      total = d.total; completed = 0;
      setProgress(0, total, 'Starting...');
      const pathEl = document.getElementById('stat-path');
      pathEl.textContent = d.output_dir;
      pathEl.title = d.output_dir;
    });

    es.addEventListener('progress', e => {
      const d = JSON.parse(e.data);
      const container = document.getElementById('queue-container');

      if (!document.getElementById(`dl-${d.index}`)) {
        removeEmptyState();
        const item = createItem(d.index, d.url, d.platform);
        container.appendChild(item);
      }
      updateItem(d.index, 'downloading', d);
      setProgress(completed, d.total, `Downloading (${d.index + 1}/${d.total})...`);
    });

    es.addEventListener('result', e => {
      const d = JSON.parse(e.data);
      completed++;
      updateItem(d.index, d.status, d);
      setProgress(completed, d.total, completed < d.total ? `Downloading (${completed + 1}/${d.total})...` : 'Finishing...');
    });

    es.addEventListener('done', e => {
      const d = JSON.parse(e.data);
      setProgress(d.total, d.total, 'Done!');
      document.getElementById('stat-total').textContent   = d.total;
      document.getElementById('stat-success').textContent = d.succeeded;
      document.getElementById('stat-failed').textContent  = d.failed;
      document.getElementById('summary-bar').classList.add('visible');
      setDisabled(false);
      es.close();

      setTimeout(() => {
        document.getElementById('overall-progress').classList.remove('visible');
      }, 3000);
    });

    es.onerror = () => {
      setDisabled(false);
      es.close();
    };
  }

  // ── Download URL ──────────────────────────────────────────────────────────
  async function startUrlDownload() {
    const url = urlInput.value.trim();
    if (!url) return;
    setDisabled(true);
    clearQueue();

    const cookies = document.getElementById('url-cookies').value;
    const res = await fetch('/api/download/url', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, cookies_browser: cookies || null }),
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || 'Error'); setDisabled(false); return; }
    listenSession(data.session_id);
  }

  // ── Download Excel ────────────────────────────────────────────────────────
  async function startExcelDownload() {
    if (!selectedFile) return;
    setDisabled(true);
    clearQueue();

    const form = new FormData();
    form.append('file', selectedFile);
    const cookies = document.getElementById('excel-cookies').value;
    if (cookies) form.append('cookies_browser', cookies);

    const res = await fetch('/api/download/excel', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok) { alert(data.error || 'Error'); setDisabled(false); return; }
    listenSession(data.session_id);
  }
</script>
